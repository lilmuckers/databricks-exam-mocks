<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>My Progress — Data Exam Prep</title>
  <script>
    (function(){var t=localStorage.getItem('theme')||((window.matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <link rel="manifest" href="/manifest.json">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CF6T77NM77"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CF6T77NM77');
  </script>
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <script src="/js/sw-init.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Stats hero ── */
    .profile-hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px;
    }
    .profile-hero__inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .profile-hero__heading {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }
    .profile-hero__sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-card__val {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card__lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Content ── */
    .profile-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── Cert section ── */
    .cert-section { margin-bottom: 36px; }
    .cert-section__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .cert-badge-sm {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.3px;
    }
    .cert-section__name { font-size: 15px; font-weight: 700; }
    .cert-section__progress { font-size: 13px; color: var(--text-muted); margin-left: auto; }

    /* ── Exam row ── */
    .exam-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .exam-row:hover { border-color: var(--border-hover); }
    .exam-row--pass { border-left: 3px solid var(--correct); }
    .exam-row--fail { border-left: 3px solid var(--incorrect); }
    .exam-row--inprogress { border-left: 3px solid var(--warning); }
    .exam-row--untouched { border-left: 3px solid var(--border); }

    .exam-row__icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .exam-row__info { flex: 1; min-width: 0; }
    .exam-row__title { font-size: 14px; font-weight: 600; }
    .exam-row__meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .exam-row__score {
      font-size: 22px;
      font-weight: 800;
      min-width: 60px;
      text-align: right;
      flex-shrink: 0;
    }

    .exam-row__actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Mini score bar ── */
    .score-bar-wrap { width: 80px; flex-shrink: 0; }
    .score-bar-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    /* ── Clear all ── */
    .danger-zone {
      margin-top: 40px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .danger-zone__title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--incorrect);
      margin-bottom: 8px;
    }
    .danger-zone__desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    .confirm-modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .confirm-modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.6; }
    .confirm-modal__actions { display: flex; gap: 10px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state__icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state__title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state__desc { font-size: 14px; }

    /* ── Attempt history ── */
    .attempts-wrap { margin-top: 6px; }
    .attempt-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 5px;
      margin-top: 4px;
    }
    .attempt-pill--pass { background: var(--correct-bg); color: var(--correct); }
    .attempt-pill--fail { background: var(--incorrect-bg); color: var(--incorrect); }

    /* ── Sync section ── */
    .sync-section { max-width: 900px; margin: 24px auto 0; padding: 0 24px; }
    .sync-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .sync-card__header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sync-card__title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .sync-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .sync-status-dot--ok { background: var(--correct); }
    .sync-status-dot--warn { background: var(--warning); }
    .sync-card__desc { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.55; }
    .sync-token-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .sync-token-input {
      flex: 1;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 16px;
      font-family: monospace;
      color: var(--text);
      outline: none;
    }
    .sync-token-input:focus { border-color: var(--border-hover); }
    .sync-hint { font-size: 12px; color: var(--text-faint); line-height: 1.5; }
    .sync-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .sync-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .sync-error { font-size: 12px; color: var(--incorrect); margin-top: 8px; }

    /* ── Status filter bar ── */
    .profile-filter-bar {
      max-width: 900px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-bar__label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .filter-pill {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      line-height: 1;
    }
    .filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-pill--completed.filter-pill--active  { border-color: var(--correct);   background: rgba(34,197,94,0.12);  color: var(--correct);  }
    .filter-pill--inprogress.filter-pill--active { border-color: var(--warning);   background: rgba(245,158,11,0.12); color: var(--warning);  }
    .filter-pill--not_attempted.filter-pill--active { border-color: var(--accent); background: rgba(59,130,246,0.12); color: var(--accent); }

    @media (max-width: 640px) {
      .profile-hero { padding: 20px 16px; }
      .profile-body { padding: 20px 16px 48px; }
      .stat-cards { grid-template-columns: repeat(3, 1fr); }

      /* Exam rows: wrap actions to second line */
      .exam-row { flex-wrap: wrap; padding: 12px 14px; gap: 10px; }
      .exam-row__icon { display: none; }
      .exam-row__info { flex: 1 1 0; min-width: 0; }
      .exam-row__score { font-size: 18px; min-width: 48px; }
      .score-bar-wrap { display: none; }
      .exam-row__actions {
        flex-basis: 100%;
        display: flex;
        gap: 6px;
      }
      .exam-row__actions .btn {
        flex: 1;
        padding: 8px 6px;
        font-size: 12px;
        justify-content: center;
      }

      .cert-section__header { flex-wrap: wrap; }
      .cert-section__progress { margin-left: 0; flex-basis: 100%; font-size: 12px; }
    }
  </style>
</head>
<body>


<!-- Hero stats -->
<div class="profile-hero">
  <div class="profile-hero__inner">
    <div class="profile-hero__heading">My Progress</div>
    <div class="profile-hero__sub">All results stored locally in your browser.</div>
    <div class="stat-cards" id="statCards" data-help="Attempts, pass rate, best and average scores — tracked automatically as you go.">
      <div class="stat-card"><div class="stat-card__val">—</div><div class="stat-card__lbl">Attempted</div></div>
      <div class="stat-card"><div class="stat-card__val">—</div><div class="stat-card__lbl">Passed</div></div>
      <div class="stat-card"><div class="stat-card__val">—</div><div class="stat-card__lbl">Best Score</div></div>
      <div class="stat-card"><div class="stat-card__val">—</div><div class="stat-card__lbl">Avg Score</div></div>
      <div class="stat-card"><div class="stat-card__val">—</div><div class="stat-card__lbl">In Progress</div></div>
    </div>
  </div>
</div>

<div class="sync-section" id="syncSection" data-help="Connect a GitHub token to keep your progress in sync between devices."></div>

<div class="profile-filter-bar" id="filterBar"></div>

<div class="profile-body" id="profileBody">
  <div class="empty-state">
    <div class="spinner" style="margin:0 auto 16px;width:32px;height:32px;border-width:2px"></div>
    <div>Loading…</div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <h3 id="confirmTitle">Clear result?</h3>
    <p id="confirmDesc">This cannot be undone.</p>
    <div class="confirm-modal__actions">
      <button class="btn btn--ghost" style="flex:1" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn--primary" style="flex:1;background:var(--incorrect)" id="confirmOk">Clear</button>
    </div>
  </div>
</div>

<div class="toast"></div>

<script type="module">
  import {
    buildExamKey,
    hydrateCatalog,
    loadJSON,
    migrateLegacyExamStorage,
    showToast,
    resultQuestionsStorageKey,
    resultStorageKey,
    sessionStorageKey
  } from './js/utils.js';
  import { initNav } from './js/nav.js';
  import { trapFocus, releaseFocus } from './js/a11y.js';
  import {
    clearConfig, clearAndPushEmpty, getFilename, getGistId, getLastSynced, getToken,
    isConfigured, markResultDeleted, saveFilename, saveToken, schedulePush, startIdlePoll,
    stopIdlePoll, syncAndPush
  } from './js/gist.js';
  initNav({ active: 'profile' });

  function scoreColor(pct) {
    if (pct >= 80) return 'var(--correct)';
    if (pct >= 70) return 'var(--warning)';
    return 'var(--incorrect)';
  }

  function formatDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatDuration(s) {
    if (!s) return '—';
    const m = Math.floor(s / 60), sec = s % 60;
    return `${m}m ${sec}s`;
  }

  let catalog = null;

  // ── Status filters ──────────────────────────────────────────────────────
  const FILTER_KEY = 'profile_status_filters';
  const FILTER_DEFS = [
    { id: 'completed',    label: 'Completed',    dot: 'var(--correct)'  },
    { id: 'inprogress',   label: 'In Progress',  dot: 'var(--warning)'  },
    { id: 'not_attempted',label: 'Not Attempted', dot: 'var(--border)'   },
  ];

  function loadFilters() {
    try {
      const saved = JSON.parse(localStorage.getItem(FILTER_KEY));
      if (Array.isArray(saved) && saved.length) return new Set(saved);
    } catch {}
    return new Set(['completed', 'inprogress']);
  }

  function saveFilters() {
    localStorage.setItem(FILTER_KEY, JSON.stringify([...activeFilters]));
  }

  let activeFilters = loadFilters();

  function getExamStatus(result, session) {
    if (result) return 'completed';
    if (session) return 'inprogress';
    return 'not_attempted';
  }

  function renderFilters() {
    const bar = document.getElementById('filterBar');
    if (!bar) return;
    bar.innerHTML = `
      <span class="filter-bar__label">Show:</span>
      ${FILTER_DEFS.map(d => `
        <button class="filter-pill filter-pill--${d.id}${activeFilters.has(d.id) ? ' filter-pill--active' : ''}"
                data-filter="${d.id}">
          ${d.label}
        </button>
      `).join('')}
    `;
    bar.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.filter;
        if (activeFilters.has(id)) {
          if (activeFilters.size > 1) activeFilters.delete(id);
        } else {
          activeFilters.add(id);
        }
        saveFilters();
        renderFilters();
        render();
      });
    });
  }

  // ── Sync UI ──
  function relativeTime(ts) {
    if (!ts) return 'never';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 10) return 'just now';
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s / 60)}m ago`;
    return `${Math.floor(s / 3600)}h ago`;
  }

  function renderSyncSection() {
    const el = document.getElementById('syncSection');
    if (!el) return;
    const token = getToken();
    const gistId = getGistId();
    const lastSynced = getLastSynced();
    const filename = getFilename();
    const defaultFilename = 'data-exam-prep-state.json';

    if (!token) {
      el.innerHTML = `
        <div class="sync-card">
          <div class="sync-card__header">
            <div class="sync-status-dot"></div>
            <div class="sync-card__title">Cloud Sync</div>
          </div>
          <div class="sync-card__desc">Sync your exam progress across devices using a GitHub personal access token. A secret Gist will be created automatically.</div>
          <div class="sync-token-row">
            <input type="password" class="sync-token-input" id="gistTokenInput" placeholder="ghp_…" autocomplete="off" />
            <button class="btn btn--primary btn--sm" onclick="connectGist()">Connect</button>
          </div>
          <div class="sync-hint">Create a token at <strong>github.com/settings/tokens</strong> — needs only the <code>gist</code> scope.</div>
          <div style="margin-top:8px">
            <button class="btn btn--ghost btn--sm" style="font-size:11px;opacity:0.6" onclick="toggleSyncAdvanced()">⚙ Advanced</button>
            <div id="syncAdvanced" style="display:none;margin-top:8px">
              <label style="font-size:12px;color:var(--text-muted)">Gist filename (for multiple profiles)</label>
              <div class="sync-token-row" style="margin-top:4px">
                <input type="text" class="sync-token-input" id="gistFilenameInput"
                  placeholder="${defaultFilename}" value="${filename !== defaultFilename ? filename : ''}"
                  autocomplete="off" style="font-size:12px" />
                <button class="btn btn--ghost btn--sm" onclick="applyGistFilename()">Save</button>
              </div>
            </div>
          </div>
          <div class="sync-error" id="syncError" style="display:none"></div>
        </div>`;
    } else if (!gistId) {
      el.innerHTML = `
        <div class="sync-card">
          <div class="sync-card__header">
            <div class="sync-status-dot sync-status-dot--warn"></div>
            <div class="sync-card__title">Cloud Sync</div>
            <span style="font-size:12px;color:var(--warning);margin-left:4px">Token saved — not yet synced</span>
          </div>
          <div class="sync-meta">Gist not yet created. Sync now to create it.</div>
          <div class="sync-actions">
            <button class="btn btn--primary btn--sm" id="syncNowBtn" onclick="doSyncNow()">↻ Sync now</button>
            <button class="btn btn--ghost btn--sm" style="color:var(--incorrect)" onclick="doDisconnect()">Disconnect</button>
          </div>
          <div class="sync-error" id="syncError" style="display:none"></div>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="sync-card">
          <div class="sync-card__header">
            <div class="sync-status-dot sync-status-dot--ok"></div>
            <div class="sync-card__title">Cloud Sync</div>
            <span style="font-size:12px;color:var(--correct);margin-left:4px">Connected</span>
            <span style="font-size:12px;color:var(--text-faint);margin-left:auto">Last synced: ${relativeTime(lastSynced)}</span>
          </div>
          <div class="sync-meta" style="font-size:11px;color:var(--text-faint)">
            File: <code>${filename}</code> &nbsp;·&nbsp; Polling every 60s
          </div>
          <div class="sync-actions">
            <button class="btn btn--ghost btn--sm" id="syncNowBtn" onclick="doSyncNow()">↻ Sync now</button>
            <button class="btn btn--ghost btn--sm" style="color:var(--incorrect)" onclick="doDisconnect()">Disconnect</button>
          </div>
          <div class="sync-error" id="syncError" style="display:none"></div>
        </div>`;
    }
  }

  window.toggleSyncAdvanced = function() {
    const el = document.getElementById('syncAdvanced');
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  };

  window.applyGistFilename = function() {
    const input = document.getElementById('gistFilenameInput');
    const val = (input?.value || '').trim();
    saveFilename(val);
    showToast(val ? `Gist file set to: ${val}` : 'Gist filename reset to default');
  };

  function showSyncError(msg) {
    const el = document.getElementById('syncError');
    if (el) { el.style.display = 'block'; el.textContent = msg; }
  }

  window.connectGist = async function() {
    const input = document.getElementById('gistTokenInput');
    const token = (input?.value || '').trim();
    if (!token) { showSyncError('Please enter a token.'); return; }
    saveToken(token);
    const btn = document.querySelector('#syncSection .btn--primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Connecting…'; }
    const result = await syncAndPush();
    if (result.ok) {
      if (result.changed) render();
      startIdlePoll();
      renderSyncSection();
      showToast('Connected to GitHub Gist');
    } else {
      clearConfig();
      renderSyncSection();
      showSyncError(result.error === 'invalid_token' ? 'Invalid token — check permissions.' : `Failed: ${result.error}`);
    }
  };

  window.doSyncNow = async function() {
    const btn = document.getElementById('syncNowBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
    const result = await syncAndPush();
    if (!result.ok) {
      showSyncError(`Sync failed: ${result.error}`);
      renderSyncSection();
      return;
    }
    if (result.changed) { render(); showToast('Synced — imported new results'); }
    else showToast('Synced successfully');
    renderSyncSection();
  };

  window.doDisconnect = function() {
    clearConfig(); // stopIdlePoll() called inside clearConfig
    renderSyncSection();
    showToast('Disconnected from GitHub Gist');
  };

  async function init() {
    const rawCatalog = await loadJSON('exams/catalog.json');
    catalog = await hydrateCatalog(rawCatalog);
    migrateLegacyExamStorage(catalog.certifications);
    renderSyncSection();
    renderFilters();
    if (isConfigured()) {
      startIdlePoll();
      const result = await syncAndPush();
      if (result.changed) { render(); renderSyncSection(); showToast('Synced new progress from Gist'); return; }
      renderSyncSection(); // update "last synced" timestamp
    }
    render();
  }

  window.addEventListener('gist:synced', () => {
    render();
    renderSyncSection();
    showToast('Synced — new results imported');
  });

  function getAllResults(validExamKeys) {
    const results = {};
    for (const key of Object.keys(localStorage)) {
      if (key.startsWith('result_') && !key.startsWith('result_questions_')) {
        const examKey = key.slice('result_'.length);
        if (validExamKeys && !validExamKeys.has(examKey)) continue;
        const val = JSON.parse(localStorage.getItem(key));
        if (val?._deleted) continue; // tombstone — treat as no result
        results[examKey] = val;
      }
    }
    return results;
  }

  function getInProgressSessions(validExamKeys) {
    const sessions = {};
    for (const key of Object.keys(localStorage)) {
      if (key.startsWith('session_')) {
        const examKey = key.slice('session_'.length);
        if (validExamKeys && !validExamKeys.has(examKey)) continue;
        sessions[examKey] = JSON.parse(localStorage.getItem(key));
      }
    }
    return sessions;
  }

  function render() {
    const validExamKeys = new Set(
      catalog.certifications.flatMap(cert => cert.exams.map(exam => buildExamKey(cert.id, exam.id)))
    );
    const results = getAllResults(validExamKeys);
    const sessions = getInProgressSessions(validExamKeys);

    // ── Compute global stats ──
    const resultList = Object.values(results);
    const attempted = resultList.length;
    const passed = resultList.filter(r => r.passed).length;
    const scores = resultList.map(r => r.percentage);
    const bestScore = scores.length ? Math.max(...scores) : null;
    const avgScore = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
    const inProgress = Object.keys(sessions).length;

    document.getElementById('statCards').innerHTML = `
      <div class="stat-card">
        <div class="stat-card__val">${attempted}</div>
        <div class="stat-card__lbl">Attempted</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__val" style="color:var(--correct)">${passed}</div>
        <div class="stat-card__lbl">Passed</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__val" style="color:${bestScore!==null?scoreColor(bestScore):'var(--text-muted)'}">
          ${bestScore !== null ? bestScore+'%' : '—'}
        </div>
        <div class="stat-card__lbl">Best Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__val" style="color:${avgScore!==null?scoreColor(avgScore):'var(--text-muted)'}">
          ${avgScore !== null ? avgScore+'%' : '—'}
        </div>
        <div class="stat-card__lbl">Avg Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__val" style="color:${inProgress?'var(--warning)':'var(--text-muted)'}">
          ${inProgress || '—'}
        </div>
        <div class="stat-card__lbl">In Progress</div>
      </div>
    `;

    // ── Per-cert sections ──
    let html = '';

    for (const cert of catalog.certifications) {
      const certTotal = cert.exams.length;
      if (certTotal === 0) continue;

      const visibleExams = cert.exams.filter(exam => {
        const examKey = buildExamKey(cert.id, exam.id);
        return activeFilters.has(getExamStatus(results[examKey], sessions[examKey]));
      });
      if (visibleExams.length === 0) continue;

      const examRows = visibleExams.map(exam => {
        const examKey = buildExamKey(cert.id, exam.id);
        return buildExamRow(cert, exam, examKey, results[examKey], sessions[examKey]);
      }).join('');
      const certAttempted = cert.exams.filter(e => results[buildExamKey(cert.id, e.id)]).length;

      html += `
        <div class="cert-section">
          <div class="cert-section__header">
            <div class="cert-badge-sm" style="background:${cert.color}">${cert.badge}</div>
            <div class="cert-section__name">${cert.name}</div>
            <div class="cert-section__progress">${certAttempted}/${certTotal} attempted</div>
          </div>
          ${examRows || `<div class="empty-state" style="padding:24px"><div class="empty-state__desc">No exams available yet for this certification.</div></div>`}
        </div>
      `;
    }

    // ── Quick Test history ──
    const qtHistory = (() => { try { return JSON.parse(localStorage.getItem('quicktest_history') || '[]'); } catch { return []; } })();
    if (qtHistory.length) {
      html += `<div class="cert-section">
        <div class="cert-section__header">
          <div class="cert-badge-sm" style="background:#8b5cf6">⚡</div>
          <div class="cert-section__name">Quick Tests</div>
          <div class="cert-section__progress">${qtHistory.length} session${qtHistory.length !== 1 ? 's' : ''}</div>
        </div>`;
      for (const qt of qtHistory) {
        const color = scoreColor(qt.percentage);
        const date = new Date(qt.date).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
        html += `
          <div class="exam-row exam-row--${qt.percentage >= 70 ? 'pass' : 'fail'}">
            <div class="exam-row__icon">⚡</div>
            <div class="exam-row__info">
              <div class="exam-row__title">${qt.label}</div>
              <div class="exam-row__meta">${qt.correct}/${qt.total} correct · ${formatDuration(qt.timeTaken)} · ${date}</div>
            </div>
            <div>
              <div class="exam-row__score" style="color:${color}">${qt.percentage}%</div>
              <div class="score-bar-wrap"><div class="score-bar-track"><div class="score-bar-fill" style="width:${qt.percentage}%;background:${color}"></div></div></div>
            </div>
            <div class="exam-row__actions">
              <a href="review.html?key=${encodeURIComponent(qt.reviewKey)}" class="btn btn--ghost btn--sm">Review</a>
              <button class="btn btn--ghost btn--sm" style="color:var(--incorrect)" onclick="clearQt('${qt.id}')">Clear</button>
            </div>
          </div>`;
      }
      html += `</div>`;
    }

    // ── Danger zone ──
    html += `
      <div class="danger-zone">
        <div class="danger-zone__title">Danger Zone</div>
        <div class="danger-zone__desc">Clearing results removes them from your browser permanently. In-progress sessions will also be lost.</div>
        <button class="btn btn--ghost btn--sm" style="border-color:var(--incorrect);color:var(--incorrect)" onclick="confirmClearAll()">
          Clear All Results & Sessions
        </button>
      </div>
    `;

    document.getElementById('profileBody').innerHTML = html;
  }

  function buildExamRow(cert, exam, examKey, result, session) {
    let statusClass = 'untouched';
    let icon = '📋';
    let scoreHtml = '<span style="color:var(--text-faint);font-size:14px">Not attempted</span>';
    let metaHtml = `${exam.questionCount} questions · ${(exam.timeLimit || cert.examDetails.timeLimit)} min`;
    let actionsHtml = `<a href="index.html" class="btn btn--ghost btn--sm">Start →</a>`;

    if (result) {
      statusClass = result.passed ? 'pass' : 'fail';
      icon = result.passed ? '✅' : '❌';
      const color = scoreColor(result.percentage);
      scoreHtml = `
        <div>
          <div class="exam-row__score" style="color:${color}">${result.percentage}%</div>
          <div class="score-bar-wrap">
            <div class="score-bar-track">
              <div class="score-bar-fill" style="width:${result.percentage}%;background:${color}"></div>
            </div>
          </div>
        </div>
      `;
      metaHtml = `
        ${result.correct}/${result.total} correct ·
        ${formatDuration(result.timeTaken)} ·
        ${formatDate(result.completedAt)}
        <span class="attempt-pill attempt-pill--${result.passed?'pass':'fail'}" style="margin-left:4px">
          ${result.passed ? '✓ Pass' : '✗ Fail'}
        </span>
      `;
      actionsHtml = `
        <button class="btn btn--ghost btn--sm" onclick="confirmClear('${examKey}', '${exam.title}')">Clear</button>
        <button class="btn btn--ghost btn--sm" onclick="goReview('${examKey}', '${cert.id}', '${exam.id}')">Review</button>
        <button class="btn btn--primary btn--sm" onclick="startExam('${cert.id}', '${exam.id}', '${exam.file}')">Retake</button>
      `;
    } else if (session) {
      statusClass = 'inprogress';
      icon = '⏸';
      const answered = Object.values(session.answers || {}).filter(a => a.length > 0).length;
      const pct = Math.round(((session.secondsLeft || 0) / (cert.examDetails.timeLimit * 60)) * 100);
      scoreHtml = `<span style="color:var(--warning);font-size:13px;font-weight:700">In progress</span>`;
      metaHtml = `${answered} answered · ${Math.floor((session.secondsLeft||0)/60)}m remaining`;
      actionsHtml = `
        <button class="btn btn--ghost btn--sm" onclick="confirmClearSession('${examKey}', '${exam.title}')">Discard</button>
        <button class="btn btn--primary btn--sm" onclick="startExam('${cert.id}', '${exam.id}', '${exam.file}')">Resume →</button>
      `;
    } else {
      actionsHtml = `<button class="btn btn--primary btn--sm" onclick="startExam('${cert.id}', '${exam.id}', '${exam.file}')">Start →</button>`;
    }

    return `
      <div class="exam-row exam-row--${statusClass}">
        <div class="exam-row__icon">${icon}</div>
        <div class="exam-row__info">
          <div class="exam-row__title">${exam.title}</div>
          <div class="exam-row__meta">${metaHtml}</div>
        </div>
        ${scoreHtml}
        <div class="exam-row__actions">${actionsHtml}</div>
      </div>
    `;
  }

  // ── Actions ──
  window.startExam = function(certId, examId, file) {
    const p = new URLSearchParams({ cert: certId, exam: examId, file: file || '' });
    window.location.href = 'exam.html?' + p.toString();
  };

  window.goReview = function(examKey, certId, examId) {
    const p = new URLSearchParams({ cert: certId, exam: examId });
    window.location.href = 'review.html?' + p.toString();
  };

  // ── Confirm helpers ──
  let pendingAction = null;

  function openConfirm(title, desc, action) {
    pendingAction = action;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent = desc;
    document.getElementById('confirmOk').onclick = () => { action(); closeConfirm(); };
    document.getElementById('confirmOverlay').classList.add('open');
    trapFocus(document.getElementById('confirmOverlay').querySelector('[role="dialog"]'));
  }

  window.closeConfirm = function() {
    releaseFocus();
    document.getElementById('confirmOverlay').classList.remove('open');
    pendingAction = null;
  };

  window.confirmClear = function(examKey, title) {
    openConfirm(
      `Clear "${title}"?`,
      'Your score and answers for this exam will be permanently removed from your browser.',
      () => {
        markResultDeleted(resultStorageKey(examKey));
        localStorage.removeItem(sessionStorageKey(examKey));
        showToast(`Cleared: ${title}`);
        schedulePush();
        render();
      }
    );
  };

  window.confirmClearSession = function(examKey, title) {
    openConfirm(
      `Discard in-progress session for "${title}"?`,
      'Your progress on this exam will be lost. You can start fresh.',
      () => {
        localStorage.removeItem(sessionStorageKey(examKey));
        showToast('Session discarded');
        schedulePush();
        render();
      }
    );
  };

  window.confirmClearAll = function() {
    openConfirm(
      'Clear everything?',
      'All exam results, scores, and in-progress sessions will be permanently removed. Your theme preference is kept.',
      async () => {
        const keysToRemove = Object.keys(localStorage).filter(k =>
          k.startsWith('result_') || k.startsWith('session_') || k === 'quicktest_history'
        );
        keysToRemove.forEach(k => localStorage.removeItem(k));
        showToast(`Cleared ${keysToRemove.length} records`);
        render();
        if (isConfigured()) clearAndPushEmpty(); // async, no await — fire-and-forget
      }
    );
  };

  window.clearQt = function(id) {
    openConfirm('Clear quick test?', 'This result will be permanently removed.',
      () => {
        const examKey = `quicktest::${id}`;
        markResultDeleted(`result_${examKey}`);
        const history = (() => { try { return JSON.parse(localStorage.getItem('quicktest_history') || '[]'); } catch { return []; } })();
        const updated = history.filter(qt => qt.id !== id);
        localStorage.setItem('quicktest_history', JSON.stringify(updated));
        showToast('Quick test cleared');
        schedulePush();
        render();
      }
    );
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeConfirm();
  });

  // Re-render if online resync brought in new results
  window.addEventListener('gist:synced', e => {
    if (e.detail?.changed) { render(); renderSyncSection(); showToast('Synced new progress from Gist'); }
  });

  init().catch(e => {
    document.getElementById('profileBody').innerHTML = `<p class="text-muted fs-14" style="padding:32px">Failed to load: ${e.message}</p>`;
  });
</script>
</body>
</html>
