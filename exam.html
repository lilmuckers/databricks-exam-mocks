<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam — Databricks Exam Prep</title>
  <script>
    (function(){var t=localStorage.getItem('theme')||((window.matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Top bar ── */
    .exam-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .exam-bar__title {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exam-bar__progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 180px;
    }
    .exam-bar__count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ── Layout ── */
    .exam-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar__head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar__body { padding: 12px; overflow-y: auto; flex: 1; }
    .sidebar__legend {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .exam-main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .question-wrap {
      flex: 1;
      padding: 28px 32px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }
    .question-num {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .question-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .question-stem {
      font-size: 16px;
      line-height: 1.65;
      margin-bottom: 24px;
      color: var(--text);
    }
    .question-stem pre { margin: 16px 0; }

    .multi-hint {
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--radius);
      padding: 8px 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Bottom nav ── */
    .exam-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .exam-footer__spacer { flex: 1; }

    /* ── Flag button ── */
    .flag-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .flag-btn:hover { color: var(--warning); border-color: rgba(245,158,11,0.4); }
    .flag-btn.flagged { color: var(--warning); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }

    /* ── Submit confirm ── */
    .submit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .submit-overlay.open { display: flex; }
    .submit-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    .submit-modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .submit-modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
    .submit-stats { display: flex; gap: 20px; margin-bottom: 24px; }
    .submit-stat { text-align: center; flex: 1; background: var(--surface2); border-radius: var(--radius); padding: 12px; }
    .submit-stat__val { font-size: 24px; font-weight: 800; }
    .submit-stat__lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .submit-actions { display: flex; gap: 10px; }

    /* ── Loading ── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      flex-direction: column;
      gap: 16px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .question-wrap { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="exam-bar">
  <a href="index.html" style="color:var(--text-muted);font-size:20px;line-height:1;" title="Exit exam">←</a>
  <span class="exam-bar__title" id="examTitle">Loading…</span>
  <div class="exam-bar__progress-wrap hide-mobile">
    <div class="progress-bar" style="flex:1">
      <div class="progress-bar__fill" id="progressFill" style="width:0%"></div>
    </div>
    <span class="exam-bar__count" id="progressCount">0/0</span>
  </div>
  <div class="timer" id="timer">--:--</div>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme" class="hide-mobile"></button>
  <button class="btn btn--ghost btn--sm" onclick="openSubmitModal()">Submit</button>
</div>

<div class="exam-layout">
  <!-- Sidebar navigator -->
  <aside class="sidebar">
    <div class="sidebar__head">
      Questions
      <span id="sidebarAnswered" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:12px;">0 answered</span>
    </div>
    <div class="sidebar__body">
      <div class="q-grid" id="qGrid"></div>
    </div>
    <div class="sidebar__legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></div>
        Unanswered
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(59,130,246,0.15);border:1px solid var(--info)"></div>
        Answered
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(245,158,11,0.15);border:1px solid var(--warning)"></div>
        Flagged
      </div>
    </div>
  </aside>

  <!-- Main question area -->
  <main class="exam-main" id="examMain">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Loading exam…</span>
    </div>
  </main>
</div>

<!-- Bottom nav -->
<div class="exam-footer">
  <button class="btn btn--ghost btn--sm" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
  <button class="flag-btn" id="flagBtn" onclick="toggleFlag()">⚑ Flag</button>
  <div class="exam-footer__spacer"></div>
  <button class="btn btn--primary btn--sm" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<!-- Submit confirmation modal -->
<div class="submit-overlay" id="submitOverlay">
  <div class="submit-modal">
    <h3>Submit Exam?</h3>
    <p>Once submitted, the exam is graded and you'll see your results with full explanations.</p>
    <div class="submit-stats">
      <div class="submit-stat">
        <div class="submit-stat__val" id="submitAnswered">0</div>
        <div class="submit-stat__lbl">Answered</div>
      </div>
      <div class="submit-stat">
        <div class="submit-stat__val" id="submitUnanswered">0</div>
        <div class="submit-stat__lbl">Unanswered</div>
      </div>
      <div class="submit-stat">
        <div class="submit-stat__val" id="submitFlagged">0</div>
        <div class="submit-stat__lbl">Flagged</div>
      </div>
    </div>
    <div class="submit-actions">
      <button class="btn btn--ghost" style="flex:1" onclick="closeSubmitModal()">Keep Going</button>
      <button class="btn btn--primary" style="flex:1" onclick="submitExam()">Submit & Grade</button>
    </div>
  </div>
</div>

<div class="toast"></div>

<script type="module">
  import { formatTime, processCodeBlocks, loadJSON, saveState, loadState, showToast } from './js/utils.js';
  import { initTheme, toggleTheme } from './js/theme.js';
  initTheme();
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  const params = new URLSearchParams(location.search);
  let examFile = decodeURIComponent(params.get('file') || '');
  let examId = params.get('exam') || '';

  // Fall back to sessionStorage (used when query params are unavailable)
  if (!examFile) {
    try {
      const pending = JSON.parse(sessionStorage.getItem('pendingExam') || 'null');
      if (pending) {
        examFile = pending.file;
        examId = pending.examId;
        sessionStorage.removeItem('pendingExam');
      }
    } catch {}
  }

  let exam = null;
  let questions = [];
  let currentIdx = 0;
  let answers = {}; // qId -> Set of selected option ids
  let flags = new Set();
  let timerInterval = null;
  let secondsLeft = 0;
  let submitted = false;

  async function init() {
    if (!examFile) {
      showError('No exam file specified.');
      return;
    }

    try {
      exam = await loadJSON(examFile);
    } catch (e) {
      showError(`Failed to load exam: ${e.message}`);
      return;
    }

    questions = exam.questions;
    secondsLeft = (exam.meta.timeLimit || 120) * 60;

    document.getElementById('examTitle').textContent =
      `${exam.meta.certificationName} — ${exam.meta.title}`;
    document.title = `${exam.meta.title} — Databricks Exam Prep`;

    // Restore session if exists
    const saved = loadState(`session_${examId}`);
    if (saved) {
      answers = Object.fromEntries(
        Object.entries(saved.answers).map(([k, v]) => [k, new Set(v)])
      );
      flags = new Set(saved.flags);
      secondsLeft = saved.secondsLeft;
      currentIdx = saved.currentIdx || 0;
    }

    buildQGrid();
    renderQuestion(currentIdx);
    startTimer();
  }

  function showError(msg) {
    document.getElementById('examMain').innerHTML =
      `<div class="loading-state"><p class="text-muted">${msg}</p><a href="index.html" class="btn btn--ghost btn--sm">← Back</a></div>`;
  }

  function saveSession() {
    if (submitted) return;
    const serializable = Object.fromEntries(
      Object.entries(answers).map(([k, v]) => [k, [...v]])
    );
    saveState(`session_${examId}`, {
      answers: serializable,
      flags: [...flags],
      secondsLeft,
      currentIdx
    });
  }

  // ── Timer ──
  function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      if (submitted) { clearInterval(timerInterval); return; }
      secondsLeft--;
      saveSession();
      updateTimerDisplay();
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        submitExam(true);
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timer');
    el.textContent = formatTime(secondsLeft);
    el.className = 'timer';
    if (secondsLeft <= 300) el.classList.add('timer--warning');
    if (secondsLeft <= 60) el.classList.remove('timer--warning'), el.classList.add('timer--critical');
  }

  // ── Question grid ──
  function buildQGrid() {
    const grid = document.getElementById('qGrid');
    grid.innerHTML = '';
    questions.forEach((q, i) => {
      const dot = document.createElement('button');
      dot.className = 'q-dot';
      dot.textContent = i + 1;
      dot.title = `Question ${i + 1}`;
      dot.onclick = () => { currentIdx = i; renderQuestion(i); };
      dot.id = `qdot-${i}`;
      grid.appendChild(dot);
    });
    updateGrid();
  }

  function updateGrid() {
    let answered = 0;
    questions.forEach((q, i) => {
      const dot = document.getElementById(`qdot-${i}`);
      if (!dot) return;
      dot.className = 'q-dot';
      if (answers[q.id]?.size > 0) { dot.classList.add('answered'); answered++; }
      if (flags.has(q.id)) dot.classList.add('flagged');
      if (i === currentIdx) dot.classList.add('current');
    });
    const total = questions.length;
    document.getElementById('sidebarAnswered').textContent = `${answered} answered`;
    document.getElementById('progressFill').style.width = `${(answered / total) * 100}%`;
    document.getElementById('progressCount').textContent = `${answered}/${total}`;
  }

  // ── Render question ──
  function renderQuestion(idx) {
    const q = questions[idx];
    if (!q) return;

    const isMulti = q.type === 'multiple';
    const sel = answers[q.id] || new Set();

    const stemHtml = processCodeBlocks(q.stem);
    const optionsHtml = q.options.map(opt => {
      const isSelected = sel.has(opt.id);
      return `
        <button class="option${isSelected ? ' selected' : ''}"
                onclick="toggleOption('${q.id}', '${opt.id}', ${isMulti})"
                data-opt="${opt.id}">
          <span class="option__key">${opt.id}</span>
          <span class="option__text">${escapeHtmlInline(opt.text)}</span>
        </button>
      `;
    }).join('');

    const multiHint = isMulti
      ? `<div class="multi-hint">⚠ Select ALL that apply — this question has multiple correct answers</div>`
      : '';

    document.getElementById('examMain').innerHTML = `
      <div class="question-wrap">
        <div class="question-header">
          <span class="question-num">Q${idx + 1} / ${questions.length}</span>
          <div class="question-tags">
            <span class="badge badge--${q.difficulty}">${q.difficulty}</span>
            <span class="badge" style="background:rgba(139,146,176,0.12);color:var(--text-muted)">${q.domain}</span>
            ${isMulti ? '<span class="badge" style="background:rgba(245,158,11,0.12);color:var(--warning)">Multi-select</span>' : ''}
          </div>
        </div>
        ${multiHint}
        <div class="question-stem">${stemHtml}</div>
        <div id="optionsWrap">${optionsHtml}</div>
      </div>
    `;

    // Update nav buttons
    document.getElementById('prevBtn').disabled = idx === 0;
    document.getElementById('nextBtn').textContent =
      idx === questions.length - 1 ? 'Review →' : 'Next →';

    // Update flag button
    const flagBtn = document.getElementById('flagBtn');
    flagBtn.className = `flag-btn${flags.has(q.id) ? ' flagged' : ''}`;
    flagBtn.innerHTML = `${flags.has(q.id) ? '⚑' : '⚐'} ${flags.has(q.id) ? 'Flagged' : 'Flag'}`;

    updateGrid();
    document.getElementById('examMain').scrollTo(0, 0);
  }

  function escapeHtmlInline(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  // ── Answer selection ──
  window.toggleOption = function(qId, optId, isMulti) {
    if (!answers[qId]) answers[qId] = new Set();
    const sel = answers[qId];

    if (isMulti) {
      if (sel.has(optId)) sel.delete(optId);
      else sel.add(optId);
    } else {
      sel.clear();
      sel.add(optId);
    }

    // Update button states
    const wrap = document.getElementById('optionsWrap');
    wrap.querySelectorAll('.option').forEach(btn => {
      const id = btn.dataset.opt;
      btn.className = `option${sel.has(id) ? ' selected' : ''}`;
    });
    wrap.querySelectorAll('.option__key').forEach(key => {
      const opt = key.closest('.option');
      const id = opt?.dataset.opt;
      if (!id) return;
    });

    updateGrid();
    saveSession();
  };

  // ── Navigation ──
  window.navigate = function(dir) {
    const next = currentIdx + dir;
    if (next < 0) return;
    if (next >= questions.length) {
      openSubmitModal();
      return;
    }
    currentIdx = next;
    renderQuestion(currentIdx);
  };

  window.toggleFlag = function() {
    const q = questions[currentIdx];
    if (flags.has(q.id)) flags.delete(q.id);
    else flags.add(q.id);
    renderQuestion(currentIdx);
    saveSession();
  };

  // ── Submit ──
  window.openSubmitModal = function() {
    const answered = Object.values(answers).filter(s => s.size > 0).length;
    const unanswered = questions.length - answered;
    const flagged = flags.size;
    document.getElementById('submitAnswered').textContent = answered;
    document.getElementById('submitUnanswered').textContent = unanswered;
    document.getElementById('submitFlagged').textContent = flagged;
    document.getElementById('submitOverlay').classList.add('open');
  };

  window.closeSubmitModal = function() {
    document.getElementById('submitOverlay').classList.remove('open');
  };

  window.submitExam = function(timeUp = false) {
    submitted = true;
    clearInterval(timerInterval);

    // Grade
    let correct = 0;
    const results = {};
    const domainStats = {};

    for (const q of questions) {
      const sel = answers[q.id] || new Set();
      const correctSet = new Set(q.correct);
      const isCorrect = sel.size === correctSet.size &&
        [...sel].every(id => correctSet.has(id));
      results[q.id] = { selected: [...sel], correct: isCorrect };
      if (isCorrect) correct++;

      if (!domainStats[q.domain]) domainStats[q.domain] = { correct: 0, total: 0 };
      domainStats[q.domain].total++;
      if (isCorrect) domainStats[q.domain].correct++;
    }

    const percentage = Math.round((correct / questions.length) * 100);
    const passed = percentage >= (exam.meta.passingScore || 70);
    const timeTaken = (exam.meta.timeLimit * 60) - secondsLeft;

    const resultData = {
      examId,
      examTitle: exam.meta.title,
      certificationName: exam.meta.certificationName,
      correct,
      total: questions.length,
      percentage,
      passed,
      timeTaken,
      domainStats,
      results,
      answers: Object.fromEntries(Object.entries(answers).map(([k, v]) => [k, [...v]])),
      completedAt: Date.now()
    };

    saveState(`result_${examId}`, resultData);
    saveState(`result_questions_${examId}`, questions);

    // Clear session
    try { localStorage.removeItem(`session_${examId}`); } catch {}

    sessionStorage.setItem('pendingReview', JSON.stringify({ examId, timeUp: !!timeUp }));
    window.location.href = 'review.html';
  };

  init();
</script>
</body>
</html>
