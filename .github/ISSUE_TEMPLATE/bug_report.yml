name: Bug Report
description: Something in the app isn't working correctly
labels: ["bug"]
body:
  - type: dropdown
    id: page
    attributes:
      label: Page affected
      options:
        - Home / cert browser
        - Exam (taking a test)
        - Review (post-exam explanations)
        - My Progress / profile
        - Quick Test
        - Other
    validations:
      required: true

  - type: textarea
    id: functionality
    attributes:
      label: What functionality is broken?
      description: Describe what you were trying to do and what went wrong.
      placeholder: e.g. "Tapping Submit on the last question doesn't navigate to the review screen"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so we can reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: What actually happened? Include any error messages or screenshots.
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Mobile (iOS Safari)
        - Mobile (Android Chrome)
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Safari)
        - Other
    validations:
      required: true

  - type: input
    id: pwa
    attributes:
      label: Installed as PWA?
      placeholder: "Yes / No"
