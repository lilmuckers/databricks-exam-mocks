name: Exam Question Issue
description: Report an incorrect, misleading, or poorly explained exam question
labels: ["exam-content"]
body:
  - type: input
    id: cert
    attributes:
      label: Certification
      placeholder: e.g. Databricks Data Engineer Associate
    validations:
      required: true

  - type: input
    id: exam
    attributes:
      label: Exam number
      placeholder: e.g. Exam 2
    validations:
      required: true

  - type: input
    id: question
    attributes:
      label: Question number or ID
      placeholder: e.g. Q14 / q14
    validations:
      required: true

  - type: checkboxes
    id: issue_type
    attributes:
      label: Type of issue
      description: Select all that apply.
      options:
        - label: The marked correct answer is wrong
        - label: A wrong answer could also be correct
        - label: The question is misleading or ambiguous
        - label: The explanation is incorrect or incomplete
        - label: The explanation contradicts the marked answer
        - label: The question contains a typo or formatting error
        - label: Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the problem
      description: Quote the question stem, the option(s) in question, and the current explanation if relevant.
      placeholder: |
        The question asks "…" and marks B as correct, but according to the official docs B is only true when X. The correct answer should be C because…
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: Supporting reference (optional)
      description: Link to official documentation, release notes, or other authoritative source that backs up your report.
      placeholder: https://docs.databricks.com/…
