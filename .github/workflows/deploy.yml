name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate news.json
        run: python3 scripts/generate_news.py

      - name: Generate reference URL list (for cache key)
        run: python3 scripts/generate_refs_meta.py --list-urls > .refs-urls.txt

      - name: Restore URL validation cache
        uses: actions/cache@v4
        with:
          path: .link-cache.json
          key: links-${{ hashFiles('.refs-urls.txt') }}
          restore-keys: links-

      - name: Validate reference URLs (captures 404s, pre-warms link cache)
        run: python3 scripts/check_links.py --check-links --fields reference --quiet

      - name: Restore reference metadata cache
        uses: actions/cache@v4
        with:
          path: references-meta.json
          key: refs-${{ hashFiles('.refs-urls.txt') }}
          restore-keys: refs-

      - name: Fetch reference metadata (incremental, skips known 404s)
        run: python3 scripts/generate_refs_meta.py --fetch --delay 1.2 --max-fetch 80

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
